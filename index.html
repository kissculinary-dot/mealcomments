<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer Feedback</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#f4f7fb;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
padding:20px;
}

/* HEADER */

h1{
font-size:38px;
color:#222;
max-width:900px;
margin-bottom:10px;
}

.subtitle{
font-style:italic;
font-size:20px;
color:#666;
margin-bottom:40px;
}

/* FORM */

.formContainer{
background:white;
padding:40px;
border-radius:14px;
box-shadow:0 20px 50px rgba(0,0,0,0.15);
width:100%;
max-width:600px;
}

label{
font-weight:700;
display:block;
margin-bottom:10px;
font-size:18px;
}

select, textarea{
width:100%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:25px;
font-family:'Montserrat',sans-serif;
}

textarea{
height:120px;
resize:none;
}

button{
background:#1e3a8a;
color:white;
border:none;
padding:15px 40px;
font-size:18px;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

/* POPUP */

#popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(.8);
background:white;
padding:40px 70px;
border-radius:14px;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
font-size:28px;
font-weight:600;
opacity:0;
pointer-events:none;
}

.show{
animation:popup .45s forwards;
}

@keyframes popup{
0%{transform:translate(-50%,-50%) scale(.8);opacity:0}
50%{transform:translate(-50%,-50%) scale(1.05);opacity:1}
100%{transform:translate(-50%,-50%) scale(1);opacity:1}
}

/* HEARTS */

.heart{
position:fixed;
font-size:22px;
animation:floatHeart 2.2s ease-out forwards;
pointer-events:none;
}

@keyframes floatHeart{
0%{
transform:translateY(0) scale(1);
opacity:1;
}
100%{
transform:translateY(-180px) scale(1.6);
opacity:0;
}
}

</style>
</head>

<body>

<h1>
How satisfied were you with the company meal programs today
(Breakfast, Korean/American Lunch, Dinner)?
</h1>

<div class="subtitle">
Please Specify the Meal Type
</div>

<div class="formContainer">

<label>Meal Type</label>
<select id="mealType">
<option value="">Select Meal</option>
<option value="Breakfast">Breakfast</option>
<option value="Korean Lunch">Korean Lunch</option>
<option value="American Lunch">American Lunch</option>
<option value="Dinner">Dinner</option>
</select>

<label>Comments</label>
<textarea id="comment" placeholder="Leave your feedback here..."></textarea>

<button onclick="submitFeedback()">Submit Feedback</button>

</div>

<div id="popup">Thank you for your feedback!</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbztv9Z_PAwtOFhxsiF2vlexbcbqD2yE54ddvDyFT94hI6jd9uq8LtWn3KTtsQbJk0Gy/exec";

/* HEARTS */

function showHearts(){

for(let i=0;i<20;i++){

const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.top=Math.random()*window.innerHeight+"px";
heart.style.fontSize=(18+Math.random()*24)+"px";
heart.style.animationDuration=(1.5+Math.random()*1.5)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),2500);

}

}

/* POPUP */

function showPopup(){

const popup=document.getElementById("popup");

popup.classList.add("show");

setTimeout(()=>{
popup.classList.remove("show");
},1800);

}

/* SUBMIT */

function submitFeedback(){

const meal=document.getElementById("mealType").value;
const comment=document.getElementById("comment").value;

if(!meal){
alert("Please select a meal type.");
return;
}

fetch(SCRIPT_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
menu:meal,
comment:comment,
timestamp:new Date().toISOString()
})
});

showHearts();
showPopup();

document.getElementById("comment").value="";
document.getElementById("mealType").value="";

}

</script>

</body>
</html>
